<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>My Orders</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>My Orders</h1>
      <div>
        <span id="who" class="small"></span>
        <a href="checkout.html" style="margin-left:12px">Checkout</a>
        <a href="order_history.html" style="margin-left:12px">Order History</a>
        <a href="#" onclick="app.logout()" style="margin-left:12px">Logout</a>
      </div>
    </header>

    <div id="orders" class="card">
      <p class="small">Loading your orders…</p>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const user = app.getCurrentUser();
    if (!user) window.location = 'login.html';
    document.getElementById('who').textContent = user ? user.name : '';

    function render() {
      const list = app.getOrdersForCurrentUser();
      const el = document.getElementById('orders');
      if (!list.length) {
        el.innerHTML = '<p>No orders yet. Place an order from the site.</p>';
        return;
      }
      let html = '<table><tr><th>Product</th><th>Quantity</th><th>Price</th><th>Date</th></tr>';
      list.forEach(o=>{
        html += `<tr><td>${o.product_name}</td><td>${o.quantity}</td><td>${app.formatCurrency(o.price)}</td><td>${new Date(o.order_date).toLocaleString()}</td></tr>`;
      });
      html += '</table>';
      el.innerHTML = html;
    }

    render();
  </script>
</body>
</html>
