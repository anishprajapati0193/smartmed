                    <label for="qty-Zandu Roll-On for Headache" data-translate="qu">Qty:</label>

      </div>

      <!-- Checkout Section (inside card, after all conditions) -->
      <div class="checkout-section">
        <button type="submit" class="btn btn-primary btn-large" data-translate="proceed_payment">
          Proceed to Payment
        </button>
      </div>
    </form>
  </div>

  <!-- Popup Modal -->
  <div id="infoModal" class="modal" aria-hidden="true">
    <div class="modal-content" role="dialog" aria-modal="true">
      <p id="modalText"></p>
    </div>
  </div>

  
  <script src="language.js"></script>




  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const diseases = document.querySelectorAll(".disease");

      // Disease accordion (only one open at a time)
      diseases.forEach(disease => {
        disease.querySelector(".disease-header").addEventListener("click", () => {
          diseases.forEach(d => {
            if (d !== disease) d.classList.remove("active");
          });
          disease.classList.toggle("active");
        });
      });

      // Company accordion (multiple allowed)
      const companies = document.querySelectorAll(".company");
      companies.forEach(company => {
        company.querySelector(".company-header").addEventListener("click", () => {
          company.classList.toggle("active");
        });
      });

      // Medicine button toggle
      const medicineButtons = document.querySelectorAll(".medicine-btn");
      medicineButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          btn.classList.toggle("selected");
        });
      });

      // Popup logic
      const modal = document.getElementById("infoModal");
      const modalText = document.getElementById("modalText");

     document.querySelectorAll(".info-icon").forEach(icon => {
  icon.addEventListener("click", (e) => {
    e.stopPropagation();

    // get raw detail from data attribute
    let raw = icon.dataset.detail || "";

    // normalize common newline encodings into actual newline characters
    // handles: real newlines, escaped "\n", and HTML entity "&#10;"
    raw = raw.replace(/\\r\\n|\\r|\\n/g, '\n')      // escaped sequences like "\n"
             .replace(/&#10;|&#x0A;/g, '\n');       // html numeric entities

    // collapse multiple blank lines and trim each line
    const lines = raw.split(/\n+/).map(s => s.trim()).filter(Boolean);

    // set modal text using textContent (keeps it safe) with '\n' between lines
    modalText.textContent = lines.join('\n');

    // show modal
    modal.style.display = "flex";
    modal.setAttribute('aria-hidden', 'false');
  });
});

      // Close modal on outside click
      window.addEventListener("click", (e) => {
        if (e.target === modal) {
          modal.style.display = "none";
        }
      });

      // Form submit
      document.getElementById('otc-form').addEventListener('submit', function(event) {
        event.preventDefault();
        const cart = [];
        const selectedBtns = document.querySelectorAll(".medicine-btn.selected");

        if (selectedBtns.length === 0) {
          alert('Please select at least one medicine.');
          return;
        }

        selectedBtns.forEach(btn => {
          const medName = btn.dataset.name;
          const medPrice = parseFloat(btn.dataset.price);
          const medId = btn.dataset.id;
          const quantityInput = document.getElementById(`qty-${medId}`);
          const medQty = parseInt(quantityInput.value);

          cart.push({ name: medName, price: medPrice, qty: medQty });
        });

        localStorage.setItem('medicineCart', JSON.stringify(cart));
        window.location.href = 'payment.html';
      });
    });
  </script>
  
</body>
</html>
