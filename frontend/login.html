<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login with OTP | Medicine Portal</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(145deg, #eef2ff, #cfd8ff);
      font-family: "Segoe UI", sans-serif;
    }
    .scene {
      perspective: 1000px;
    }
    .card-3d {
      background: white;
      border-radius: 20px;
      box-shadow: 0 15px 25px rgba(0,0,0,0.15);
      padding: 40px;
      width: 330px;
      text-align: center;
      transform: translateZ(60px) rotateX(6deg);
      transition: transform 0.2s ease;
    }
    h1 {
      margin-bottom: 10px;
      color: #333;
    }
    p {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 15px;
      text-align: left;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      color: #333;
    }
    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    .btn {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 15px;
      font-weight: 600;
      transition: 0.2s;
    }
    .btn-primary {
      background: #3366ff;
      color: white;
    }
    .btn-primary:hover {
      background: #2950d8;
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    .otp-controls {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    #recaptcha-container {
      margin-top: 5px;
    }
    .muted-note {
      margin-top: 10px;
      color: #777;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="card-3d" id="card">
      <h1>Login with OTP</h1>
      <p>Verify your phone number to continue</p>

      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter username" required>
        </div>
        <div class="form-group">
          <label for="phoneNumber">Phone Number (+91XXXXXXXXXX)</label>
          <input type="text" id="phoneNumber" placeholder="+91XXXXXXXXXX" required>
        </div>

        <div id="recaptcha-container"></div>

        <div class="form-group otp-controls">
          <button type="button" id="send-otp" class="btn btn-secondary">Send OTP</button>
          <input type="text" id="otp" placeholder="Enter OTP">
          <button type="button" id="verify-otp" class="btn btn-primary">Verify</button>
        </div>

        <button type="submit" class="btn btn-primary" id="login-btn">Login</button>
      </form>

      <div class="muted-note">Secure • Free OTP verification via Firebase</div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <script>
    // ✅ Your Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCLxCDo66TV7P5Ui1s8_ZQCZbg3QoJ_Z7Y",
      authDomain: "login-with-otp-e3a4a.firebaseapp.com",
      projectId: "login-with-otp-e3a4a",
      storageBucket: "login-with-otp-e3a4a.firebasestorage.app",
      messagingSenderId: "106319465171",
      appId: "1:106319465171:web:aab357f7a3e4ba48e4e226",
      measurementId: "G-8F44BM7JJP"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    let recaptchaVerifier;
    function setupRecaptcha() {
      if (recaptchaVerifier) return;
      recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
        'size': 'invisible'
      });
      recaptchaVerifier.render();
    }
    setupRecaptcha();

    let confirmationResult;
    document.getElementById('send-otp').addEventListener('click', async () => {
      const phoneNumber = document.getElementById('phoneNumber').value.trim();
      if (!phoneNumber) return alert('Please enter your phone number with country code.');

      try {
        confirmationResult = await auth.signInWithPhoneNumber(phoneNumber, recaptchaVerifier);
        alert('OTP sent to ' + phoneNumber);
      } catch (err) {
        console.error(err);
        alert('Error sending OTP: ' + err.message);
      }
    });

    document.getElementById('verify-otp').addEventListener('click', async () => {
      const otp = document.getElementById('otp').value.trim();
      if (!otp || !confirmationResult) {
        alert('Enter OTP or send OTP first.');
        return;
      }
      try {
        const result = await confirmationResult.confirm(otp);
        const user = result.user;
        const phone = user.phoneNumber;
        const username = document.getElementById('username').value || "Guest";

        // Save verified user in backend (PHP)
        const res = await fetch("save_verified_phone.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, phone })
        });
        const data = await res.json();
        if (data.ok) {
          alert("Login Successful ✅");
          window.location.href = "dashboard.php";
        } else {
          alert("Database Error: " + data.error);
        }
      } catch (err) {
        console.error(err);
        alert('Invalid OTP, please try again.');
      }
    });

    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Please verify your phone with OTP first.');
    });

    // 3D Hover Effect
    const scene = document.querySelector('.scene');
    const card = document.getElementById('card');
    scene.addEventListener('mousemove', (e) => {
      const rect = scene.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const cx = rect.width / 2;
      const cy = rect.height / 2;
      const dx = (x - cx) / cx;
      const dy = (y - cy) / cy;
      const rotateY = dx * 10;
      const rotateX = -dy * 8;
      card.style.transform = `translateZ(60px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });
    scene.addEventListener('mouseleave', () => {
      card.style.transform = 'translateZ(60px) rotateX(6deg)';
    });
  </script>
</body>
</html>
